#
# This is a Miku.
# ----------------------------------------------------------------------------------------------------------------------------

# ----------------------------------------------------------------------------------------------------------------------------
# ClassSays 配置文件
#
# 几乎每个配置项都有详细的注释，请仔细阅读。
# 格式=> 键: 值 # YML 内格式, 补充格式 说明
# YML 内格式是 YML 语言的配置格式，如 Boolean(布尔值)、Number(数字)、String(字符串)、Array(数组)、Object(对象)、~(Null)。
# 补充格式是其应当遵守的其他格式，如 URL(统一资源定位器)、颜色(Hex 或 RGB)、JSON Object(JavaScript 对象)。
# [ a | b | c ] 代表可选值，a、b、c 分别代表可选值，N 选 1.
# ----------------------------------------------------------------------------------------------------------------------------

# -----------------------------------------
# 主渲染开关
# -----------------------------------------
enable: true # Boolean, 是否启用 ClassSays 主渲染，设置为 false 则不渲染任何内容

# -----------------------------------------
# 后端地址
# -----------------------------------------
api:
  enable: true # Boolean, 是否启用后端 API 功能，设置为 false 则不启用 API
  url: "http://localhost:3000" # String, URL 后端 API 地址，留空则使用默认地址




# -----------------------------------------
# 顶部菜单栏设置
# -----------------------------------------
nav:
  title: "ClassSays"
  menu:
    enable: true
    items:
      # 普通链接
      - label: "首页"
        url: "/"
        icon: "fas fa-home"
      
      # # 搜索按钮（特殊类型）
      # - label: "搜索"
      #   type: "search"
      #   icon: "fas fa-search"
      
      # 普通链接（无图标）
      - label: "关于"
        url: "/about"
        icon: "fa-solid fa-circle-info"
      - label: "切换夜间模式(临时)"
        url: "javascript:lightDarkTheme.toggleTheme();"
        icon: "fa-solid fa-moon"
      
      
      # 高级自定义链接（带额外属性）
      - label: "GitHub"
        type: "advanced"
        url: "https://github.com/admincmd-a/classSays"
        icon: "fas fa-external-link"
        target: "_blank"

      # 下拉菜单（有子项）
      # - label: "班级分类"
      #   icon: "fas fa-folder"
      #   children:
      #     - label: "名人名言"
      #       url: "/quotes"
      #       icon: "fas fa-quote-left"
      #     - label: "硬件维修实录"
      #       url: "/repair"
      #       icon: "fas fa-microchip"
      
      # 直接插入 HTML（完全自定义）
      # - type: "html"
      #   html: '<div class="custom-badge">🔥 中考倒计时</div>'

# -----------------------------------------
# 主题设置
# -----------------------------------------

themes:
  enable: true # 是否启用颜色主题功能
  mode: auto # 自动模式（跟随系统）/ 手动模式（跟随用户）
  auto_switch_dark_mode: true # 自动切换夜间模式（仅在自动模式下生效）
  default: "蔚蓝档案" # 默认主题
  items:
    - name: "蔚蓝档案" # 这是什么奇怪的主题名
      type: "light"
      colors:
        primary: "#0077be" # 主色调
        accent: "#ff6f00" # 强调色调
        secondary: "#00bfff" # 次要色调
        success: "#28a745" # 成功色
        info: "#17a2b8" # 信息色
        warning: "#ffc107" # 警告色
        error: "#dc3545" # 错误色
        light: "#f8f9fa" # 浅色
        dark: "#343a40" # 深色
        muted: "#6c757d" # 灰色
        white: "#fff" # 白色
        black: "#000" # 黑色
    - name: "蔚蓝档案"
      type: "dark"
      colors:
        primary: "#0077be"
        accent: "#ff6f00"
        secondary: "#00bfff"
        success: "#28a745"
        info: "#17a2b8"
        warning: "#ffc107"
        error: "#dc3545"
        light: "#f8f9fa"
        dark: "#343a40"
        muted: "#6c757d"
        white: "#fff"
        black: "#000"
    

# ----------------------------------------------------------------------------------------------------------------------------
# APlayer (音乐播放器)
# https://github.com/DIYgod/APlayer
# https://aplayer.js.org/#/home
# ----------------------------------------------------------------------------------------------------------------------------

aplayer:
  enable: true # Boolean, 是否启用音乐播放器，他是吸低的
  js: # String, 自定义 APlayer 的 js 文件路径，留空则使用默认路径
  css: # String, 自定义 APlayer 的 css 文件路径，留空则使用默认路径

  lrcType: # [ 1 | 2 | 3 ] 歌词取值类型 ,若空 为 3
  themeColor: # String, 主题颜色，留空则使用默认颜色
  audio: # Array, 音乐列表
    - name: "勾指起誓"
      artist: "洛天依 / ilem"
      url: "https://npm.elemecdn.com/musiccdn-ariasaka/music/%E5%8B%BE%E6%8C%87%E8%B5%B7%E8%AA%93.mp3"
      cover: "https://npm.elemecdn.com/musiccdn-ariasaka/pic/%E5%8B%BE%E6%8C%87%E8%B5%B7%E8%AA%93.jpg"
      lrc: "https://npm.elemecdn.com/musiccdn-ariasaka/lyric/%E5%8B%BE%E6%8C%87%E8%B5%B7%E8%AA%93.lrc"
      theme: ""
  
  config: # String, JSON Object APlayer 配置项，此项将覆写以上配置，务必指定container: document.getElementById('aplayer'),fixed: true,
  # 具体请参考 https://aplayer.js.org/#/home

welcomeMessage:
