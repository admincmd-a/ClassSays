# ----------------------------------------------------------------------------------------------------------------------------
# 白天模式和黑夜模式切换时的 JavaScript 脚本
# ----------------------------------------------------------------------------------------------------------------------------
# 它将在切换和初始化时执行
# 若你想在切换时执行一些操作，请在这里写下
# 若不起效果，请在网页控制台中运行 
# @code {errorCodes.getErrors(0x01010)} (LIGHT) 或 @code {errorCodes.getErrors(0x01011)} (DARK)
# 以查找发生的异常，通常控制台里也会有
# 注：FUNCTION 函数不得留空，否则会报错，如删除请填入 nullFunction
lightDarkMode:
  light: # 亮色主题
    js: ""
    function: nullFunction
  dark: # 暗色主题
    js: ""
    function: nullFunction

